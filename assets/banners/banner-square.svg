<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="50%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 3x3 mosaic centerpiece -->
  <g transform="translate(270,180)">
    <rect x="0" y="0" width="160" height="160" rx="14" fill="#155e75"/>
    <rect x="180" y="0" width="160" height="160" rx="14" fill="#0ea5e9"/>
    <rect x="360" y="0" width="160" height="160" rx="14" fill="#164e63"/>
    <rect x="0" y="180" width="160" height="160" rx="14" fill="#0e7490"/>
    <rect x="180" y="180" width="160" height="160" rx="14" fill="#22d3ee"/>
    <rect x="360" y="180" width="160" height="160" rx="14" fill="#083344"/>
    <rect x="0" y="360" width="160" height="160" rx="14" fill="#083344"/>
    <rect x="180" y="360" width="160" height="160" rx="14" fill="#2dd4bf"/>
    <rect x="360" y="360" width="160" height="160" rx="14" fill="#155e75"/>
    <polygon points="260,240 290,270 260,300 230,270" fill="#f8fafc"/>
  </g>
  <text x="540" y="780" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700">Cryptographic Mosaic</text>
  <text x="540" y="850" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28">Sensory 2FA for XRPL</text>
  <text x="540" y="960" text-anchor="middle" fill="#38bdf8" font-family="Consolas, monospace" font-size="22">mosaico-criptografico.vercel.app</text>
</svg>
